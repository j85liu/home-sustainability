<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Reducing Greenhouse Gas Emissions at Home{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    {% block head_extra %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <nav class="site-nav" aria-label="Primary navigation">
        <div class="site-nav-inner">
            <div class="site-nav-links">
                <a href="{{ url_for('home') }}" class="site-nav-link{% if request.endpoint == 'home' %} is-active{% endif %}">Home</a>
                <a href="{{ url_for('learn_home') }}" class="site-nav-link{% if request.endpoint in ['learn_home', 'lesson_page', 'lesson_welcome'] %} is-active{% endif %}">How to Reduce Emissions at Home</a>
                <a href="{{ url_for('quiz_setup') }}" class="site-nav-link{% if request.endpoint == 'quiz_setup' %} is-active{% endif %}">Test Yourself</a>
            </div>
        </div>
    </nav>
    {% block content %}{% endblock %}
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
