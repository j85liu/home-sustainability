<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sustainable Living{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
  
  <!-- jQuery UI CSS -->
  <link rel="stylesheet" href="http://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
  
  <!-- Main CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/lessons.css') }}">
  
</head>
<body class="{% block body_class %}{% endblock %}">
  <nav class="site-nav" aria-label="Primary navigation">
    <div class="site-nav-inner">
      <div class="site-nav-links">
        <a href="{{ url_for('home') }}" class="site-nav-link{% if request.endpoint == 'home' %} is-active{% endif %}">Home</a>
        <a href="{{ url_for('learn_home') }}" class="site-nav-link{% if request.endpoint in ['learn_home', 'lesson_page', 'lesson_welcome'] %} is-active{% endif %}">Lesson</a>
        <a href="{{ url_for('quiz_setup') }}" class="site-nav-link{% if request.endpoint in ['quiz_binary', 'quiz_planner', 'quiz_setup'] %} is-active{% endif %}">Test Yourself</a>
      </div>
    </div>
  </nav>
  
  {% block content %}{% endblock %}

  <footer class="footer-bar"></footer>

  <!-- jQuery & jQuery UI CDN -->
  <script src="https://code.jquery.com/jquery-1.12.4.js"></script>
  <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  
  <!-- bootstrap cdn files -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.min.js" integrity="sha384-pQQkAEnwaBkjpqZ8RU1fF1AKtTcHJwFl3pblpTlHXybJjHpMYo79HY3hIi4NKxyj" crossorigin="anonymous"></script>
  
  {% block scripts %}{% endblock %}
</body>
</html>
